# Task runner for rsicarelli.com (https://taskfile.dev).
# Thin, discoverable wrappers around the pnpm scripts so day-to-day commands and the
# Definition of Done are one `task <name>` away. Node/pnpm/task are pinned in mise.toml
# (mise) — run `mise install` once, then `task --list`.
version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies from the frozen lockfile
    cmds:
      - pnpm install --frozen-lockfile

  dev:
    desc: Start the Astro dev server
    cmds:
      - pnpm dev

  build:
    desc: Build the production site to dist/
    cmds:
      - pnpm build

  preview:
    desc: Preview the production build locally
    cmds:
      - pnpm preview

  typecheck:
    desc: Type-check Astro + TypeScript (astro check)
    cmds:
      - pnpm typecheck

  lint:
    desc: Lint with ESLint
    cmds:
      - pnpm lint

  lint:fix:
    desc: Lint and auto-fix
    cmds:
      - pnpm lint:fix

  fmt:
    desc: Format the whole repo with Prettier
    cmds:
      - pnpm format

  fmt:check:
    desc: Check formatting without writing (read-only)
    cmds:
      - pnpm format:check

  i18n:check:
    desc: Fail if any content entry is missing a locale (.en + .pt) — scripts/check-locale-completeness.mjs
    cmds:
      - pnpm check:i18n

  test:
    desc: Run the test suite (Vitest) — rendered tests assume dist/ is already built
    cmds:
      - pnpm test

  test:i18n:
    desc: i18n tests — build the site, then assert on the rendered dist/** output
    cmds:
      - task: build
      - pnpm test:i18n

  lighthouse:
    desc: Core Web Vitals budget — build, then run Lighthouse CI against dist (needs Chrome)
    cmds:
      - task: build
      - pnpm lighthouse

  check:
    desc: All quality gates — typecheck + lint + format check
    cmds:
      - task: typecheck
      - task: lint
      - task: fmt:check

  dod:
    desc: Definition of Done — format, every gate + i18n completeness, build, then tests (run before committing)
    cmds:
      - task: fmt
      - task: check
      - task: i18n:check
      - task: build
      - task: test

  hooks:install:
    desc: Enable the version-controlled .githooks/ directory (pre-commit DOD gate)
    cmds:
      - git config core.hooksPath .githooks
      - echo "✓ git hooks enabled (.githooks/). Skip once with 'git commit --no-verify'."

  hooks:uninstall:
    desc: Restore Git's default .git/hooks/ directory
    cmds:
      - git config --unset core.hooksPath
      - echo "✓ git hooks disabled (back to .git/hooks/)."

name: '🐛 Bug'
description: "Something isn't working as expected."
title: '[Bug] '
labels: ['bug']
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. ...
    validations:
      required: false
  - type: input
    id: where
    attributes:
      label: Where
      description: URL, page, locale (pt-br/en), device/browser.
    validations:
      required: false

name: "✅ Task"
description: "A single, shippable unit of work — usually a sub-issue of an epic."
title: ""
labels: []
body:
  - type: input
    id: parent
    attributes:
      label: Parent epic
      description: "The epic this belongs to, e.g. #12"
      placeholder: "#"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What needs doing and why. Link the relevant research section if useful.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet the conditions that must be true for this to be Done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Foundation
        - DevEx
        - i18n
        - Content
        - Design
        - SEO
        - Infra
        - Analytics
        - Security
        - Payments
    validations:
      required: true

name: SEO tests

# Rendered-output SEO/GEO tests (Vitest over dist/**): hreflang ISO-code validity + reciprocity
# across pages, the neutral gateway and the XML sitemap (#57), and the metadata/JSON-LD surface as
# later SEO sub-issues land. Standalone workflow (its own file, separate from ci.yml and the i18n
# suites) that builds the site then runs the suite. See Epic 6 (#50).

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/seo/**'
      - 'tests/i18n/_helpers.ts'
      - 'astro.config.mjs'
      - 'vitest.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/seo-tests.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/seo/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  seo-tests:
    name: SEO rendered-output tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Reuses the mise-pinned toolchain (Node/pnpm/go-task from .tool-versions).
      - uses: ./.github/actions/setup
      - run: task build
      - run: pnpm test:seo
